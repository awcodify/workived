<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Workived</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#F3F2FB">

  <!-- Favicon (inline SVG) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%239B8FF7'/><stop offset='100%25' stop-color='%236357E8'/></linearGradient></defs><rect x='1' y='1' width='46' height='46' rx='12' fill='url(%23g)'/><rect x='16' y='11' width='22' height='7' rx='3' fill='white' opacity='0.35'/><rect x='13' y='19' width='24' height='7' rx='3' fill='white' opacity='0.6'/><rect x='10' y='27' width='26' height='7' rx='3' fill='white'/></svg>">

  <!-- Plus Jakarta Sans from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --accent: #6357E8;
      --accent-mid: #9B8FF7;
      --ink-900: #0F0E13;
      --ink-500: #72708A;
      --ink-300: #B0AEBE;
      --ink-100: #EDECF4;
      --ink-50: #F3F2FB;
      --ink-0: #FFFFFF;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--ink-0);
      color: var(--ink-900);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      top: -100px;
      right: -100px;
      background: radial-gradient(circle, rgba(155, 143, 247, 0.08) 0%, transparent 70%);
      border-radius: 50%;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      bottom: -80px;
      left: -80px;
      background: radial-gradient(circle, rgba(99, 87, 232, 0.06) 0%, transparent 70%);
      border-radius: 50%;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 20px;
      max-width: 600px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 60px;
      text-decoration: none;
    }
    .logo svg {
      width: 32px;
      height: 32px;
    }
    .logo span {
      font-size: 20px;
      font-weight: 700;
      color: var(--ink-900);
    }

    .error-code {
      font-size: clamp(80px, 15vw, 140px);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-mid) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 24px;
      letter-spacing: -0.03em;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 700;
      color: var(--ink-900);
      margin-bottom: 16px;
      line-height: 1.2;
    }

    p {
      font-size: 17px;
      color: var(--ink-500);
      line-height: 1.7;
      margin-bottom: 40px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 360px;
      margin: 0 auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 32px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      transition: all 0.25s ease;
      border: none;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-mid) 0%, var(--accent) 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(99, 87, 232, 0.2);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 87, 232, 0.3);
    }

    .btn-secondary {
      background: var(--ink-50);
      color: var(--accent);
    }
    .btn-secondary:hover {
      background: var(--ink-100);
    }

    .suggestions {
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid var(--ink-100);
    }

    .suggestions h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink-500);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 20px;
    }

    .suggestions-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .suggestion-link {
      padding: 8px 16px;
      border-radius: 8px;
      background: var(--ink-50);
      color: var(--ink-900);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .suggestion-link:hover {
      background: var(--ink-100);
      color: var(--accent);
    }

    @media (max-width: 640px) {
      .logo { margin-bottom: 40px; }
      .error-code { margin-bottom: 20px; }
      h1 { margin-bottom: 12px; }
      p { font-size: 15px; margin-bottom: 32px; }
      .suggestions { margin-top: 40px; padding-top: 32px; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="container">
    <a href="/" class="logo">
      <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
        <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#9B8FF7"/><stop offset="100%" stop-color="#6357E8"/></linearGradient></defs>
        <rect x="1" y="1" width="46" height="46" rx="12" fill="url(#g)"/>
        <rect x="16" y="11" width="22" height="7" rx="3" fill="white" opacity="0.35"/>
        <rect x="13" y="19" width="24" height="7" rx="3" fill="white" opacity="0.6"/>
        <rect x="10" y="27" width="26" height="7" rx="3" fill="white"/>
      </svg>
      <span>Workived</span>
    </a>

    <div class="error-code">404</div>
    
    <h1>This page took a leave day</h1>
    
    <p>We looked everywhere — in tasks, attendance logs, even the claims archive. Nothing here. Maybe it never existed, or maybe it's just on vacation.</p>

    <div class="actions">
      <a href="/" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Back to homepage
      </a>
      <a href="mailto:my@workived.com" class="btn btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
        Report a broken link
      </a>
    </div>

    <div class="suggestions">
      <h3>Quick links</h3>
      <div class="suggestions-list">
        <a href="/" class="suggestion-link">Home</a>
        <a href="mailto:my@workived.com" class="suggestion-link">Contact</a>
      </div>
    </div>
  </div>
</body>
</html>
