      tags:
      - Employees
  /organisations:
    post:
      consumes:
      - application/json
      parameters:
      - description: Organisation details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_organisation.CreateOrgRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            properties:
              data:
                $ref: '#/definitions/internal_organisation.Organisation'
            type: object
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                $ref: '#/definitions/github_com_workived_services_pkg_apperr.AppError'
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                $ref: '#/definitions/github_com_workived_services_pkg_apperr.AppError'
            type: object
        "409":
          description: Slug already taken
          schema:
            properties:
              error:
                $ref: '#/definitions/github_com_workived_services_pkg_apperr.AppError'
            type: object
      security:
      - BearerAuth: []
      summary: Create a new organisation
      tags:
      - Organisations
  /organisations/invitations:
    post:
      consumes:
      - application/json
      description: Requires owner or admin role.
      parameters:
      - description: Invitee email and role
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_organisation.InviteMemberRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            properties:
              data:
                properties:
                  message:
                    type: string
