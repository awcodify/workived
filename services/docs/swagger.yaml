            type: object
      security:
      - BearerAuth: []
      summary: Get the authenticated user's organisation
      tags:
      - Organisations
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: 'JWT access token. Format: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
