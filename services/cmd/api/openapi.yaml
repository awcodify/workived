          application/json:
            schema:
              $ref: "#/components/schemas/CreateDashboardRequest"
      responses:
        "200":
          description: Dashboard updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Dashboard"
        "404":
          $ref: "#/components/responses/NotFoundError"

    delete:
      operationId: deleteDashboard
      summary: Delete a dashboard and all its widgets
      tags: [Dashboards]
      responses:
        "204":
          description: Dashboard deleted
        "404":
          $ref: "#/components/responses/NotFoundError"

  /dashboards/{id}/widgets:
    parameters:
      - $ref: "#/components/parameters/ResourceID"

    get:
      operationId: listWidgets
      summary: List widgets for a dashboard
      tags: [Dashboards]
      responses:
        "200":
          description: List of widgets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Widget"

    post:
      operationId: createWidget
      summary: Create a widget on a dashboard
      tags: [Dashboards]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWidgetRequest"
      responses:
        "201":
          description: Widget created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Widget"
        "400":
          $ref: "#/components/responses/ValidationError"

  /dashboards/{id}/widgets/{wid}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
      - name: wid
        in: path
        required: true
        schema:
          type: string
          format: uuid

    put:
      operationId: updateWidget
      summary: Update a widget (config, position, or both)
      tags: [Dashboards]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWidgetRequest"
      responses:
        "200":
          description: Widget updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Widget"
        "404":
          $ref: "#/components/responses/NotFoundError"

    delete:
      operationId: deleteWidget
      summary: Delete a widget
      tags: [Dashboards]
      responses:
        "204":
          description: Widget deleted
        "404":
          $ref: "#/components/responses/NotFoundError"

  /dashboards/query:
    post:
      operationId: executeQuery
      summary: Execute a widget query
      description: |
        Translates a QueryConfig to SQL and runs it against the org's data.
        Results are cached for 5 minutes per org + query config hash.
        Used by the frontend to preview widget data before saving.
      tags: [Dashboards]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query_config]
              properties:
                query_config:
                  $ref: "#/components/schemas/QueryConfig"
      responses:
        "200":
          description: Query result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/QueryResult"
        "400":
          $ref: "#/components/responses/ValidationError"

# ── Components ────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from `/auth/login`

  parameters:
    ResourceID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  # ── Announcements ────────────────────────────────────────────────────────
  /announcements:
    get:
      operationId: listAnnouncements
      summary: List published announcements
      description: Returns published announcements for the employee, with is_read flag.
      tags: [Announcements]
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      summary: Create announcement (admin)
      tags: [Announcements]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementRequest"
      responses:
        "201":
          description: Created announcement
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Announcement"

  /announcements/admin:
    get:
      operationId: listAnnouncementsAdmin
      summary: List all announcements including drafts (admin)
      tags: [Announcements]
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Announcement"

  /announcements/unread-count:
    get:
      operationId: getAnnouncementUnreadCount
      summary: Get unread announcement count for current employee
      tags: [Announcements]
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      count:
                        type: integer

  /announcements/{id}:
    put:
      operationId: updateAnnouncement
      summary: Update announcement (admin)
      tags: [Announcements]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAnnouncementRequest"
      responses:
        "200":
          description: Updated announcement
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Announcement"
    delete:
      operationId: deleteAnnouncement
      summary: Delete announcement (admin)
      tags: [Announcements]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /announcements/{id}/publish:
    patch:
      operationId: publishAnnouncement
      summary: Publish announcement (admin)
      tags: [Announcements]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Published announcement
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Announcement"

  /announcements/{id}/pin:
    patch:
      operationId: pinAnnouncement
      summary: Pin announcement (admin)
      tags: [Announcements]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Pinned announcement

  /announcements/{id}/unpin:
    patch:
      operationId: unpinAnnouncement
      summary: Unpin announcement (admin)
      tags: [Announcements]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Unpinned announcement

  /announcements/{id}/read:
    post:
      operationId: markAnnouncementRead
      summary: Mark announcement as read
      tags: [Announcements]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Marked as read

  # ── Reusable responses ──────────────────────────────────────────────────
  responses:
    MessageResponse:
      description: Generic success message
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  message:
                    type: string
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    UnauthorizedError:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ForbiddenError:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ConflictError:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    UpgradeRequiredError:
      description: Feature requires Pro plan (402)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InsufficientBalanceError:
      description: Insufficient balance or budget (422)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  # ── Schemas ─────────────────────────────────────────────────────────────
  schemas:
    # ── Shared ────────────────────────────────────────────────────────────
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/AppError"

    AppError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - NOT_FOUND
            - UNAUTHORIZED
            - FORBIDDEN
            - VALIDATION_ERROR
            - UPGRADE_REQUIRED
            - INSUFFICIENT_BALANCE
            - CONFLICT
            - INTERNAL_ERROR
          examples:
            - VALIDATION_ERROR
        message:
          type: string
          examples:
            - "email is required"
        field:
          type: string
          examples:
            - "email"

    PaginationMeta:
      type: object
      required: [has_more, limit]
      properties:
        next_cursor:
          type: string
          description: Pass this as `?cursor=` to fetch the next page
        has_more:
          type: boolean
        limit:
          type: integer

    # ── Auth ──────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        is_verified:
          type: boolean
        is_active:
          type: boolean
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [email, password, full_name]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 72
        full_name:
          type: string
          minLength: 1
          maxLength: 255

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Only needed if the httpOnly cookie is absent

    RefreshResponse:
      type: object
      properties:
        access_token:
          type: string

    VerifyEmailRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          maxLength: 255

    ResetPasswordRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8
          maxLength: 72

    # ── Organisation ──────────────────────────────────────────────────────
    Organisation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        country_code:
          type: string
          description: ISO 3166-1 alpha-2
          examples: ["ID", "AE"]
        timezone:
          type: string
          examples: ["Asia/Jakarta", "Asia/Dubai"]
        currency_code:
          type: string
          description: ISO 4217
          examples: ["IDR", "AED"]
        work_days:
          type: array
          items:
            type: integer
          description: "0=Sun, 1=Mon, ..., 6=Sat"
          examples: [[1, 2, 3, 4, 5]]
        plan:
          type: string
          enum: [free, pro]
        plan_employee_limit:
          type: integer
          nullable: true
          description: "null for Pro (unlimited), 25 for Free"
        logo_url:
          type: string
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    CreateOrgRequest:
      type: object
      required: [name, slug, country_code, timezone, currency_code]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        slug:
          type: string
          minLength: 2
          maxLength: 100
          pattern: "^[a-zA-Z0-9]+$"
        country_code:
          type: string
          minLength: 2
          maxLength: 2
        timezone:
          type: string
          maxLength: 50
        currency_code:
          type: string
          minLength: 3
          maxLength: 3

    InviteMemberRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        role:
          type: string
          enum: [admin, member]

    # ── Setup Wizard ──────────────────────────────────────────────────────
    SetupStatus:
      type: object
      properties:
        needs_setup:
          type: boolean
          description: Whether the organisation needs to complete the setup wizard
        skipped:
          type: boolean
          description: Whether the setup wizard was explicitly skipped
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: When the setup was completed
        work_schedule_exists:
          type: boolean
          description: Whether a work schedule has been configured
        leave_policies_count:
          type: integer
          description: Number of active leave policies
        claim_categories_count:
          type: integer
          description: Number of active claim categories
        members_count:
          type: integer
          description: Number of organisation members

    SetupTemplatesResponse:
      type: object
      properties:
        work_schedules:
          type: array
          items:
            $ref: "#/components/schemas/WorkScheduleTemplate"
        leave_policies:
          type: array
          items:
            $ref: "#/components/schemas/LeavePolicyTemplate"
        claim_categories:
          type: array
          items:
            $ref: "#/components/schemas/ClaimCategoryTemplate"

    WorkScheduleTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        country_code:
          type: string
          examples: ["ID", "AE"]
        name:
          type: string
        description:
          type: string
        work_days:
          type: array
          items:
            type: integer
          description: "1=Mon, 2=Tue, ..., 7=Sun"
        start_time:
          type: string
          format: time
          examples: ["08:00:00"]
        end_time:
          type: string
          format: time
          examples: ["17:00:00"]
        sort_order:
          type: integer

    LeavePolicyTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        country_code:
          type: string
          examples: ["ID", "AE"]
        name:
          type: string
        description:
          type: string
        entitled_days_per_year:
          type: number
          format: float
        is_carry_over_allowed:
          type: boolean
        max_carry_over_days:
          type: number
          format: float
          nullable: true
        is_accrued:
          type: boolean
        requires_approval:
          type: boolean
        gender_eligibility:
          type: string
          enum: [all, male, female]
          description: Gender eligibility filter for this leave type
        sort_order:
          type: integer

    ClaimCategoryTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        country_code:
          type: string
          examples: ["ID", "AE"]
        name:
          type: string
        description:
          type: string
        monthly_limit:
          type: integer
          format: int64
          nullable: true
          description: Monthly limit in smallest currency unit (e.g., cents). NULL means unlimited.
        currency_code:
          type: string
          nullable: true
          description: ISO 4217 currency code. NULL when monthly_limit is NULL.
        requires_receipt:
          type: boolean
        budget_period:
          type: string
          enum: [monthly, yearly]
          description: Whether the budget limit applies monthly or yearly
        sort_order:
          type: integer

    CompleteSetupRequest:
      type: object
      required: [work_schedule, leave_policies, claim_categories]
      properties:
        work_schedule:
          $ref: "#/components/schemas/WorkScheduleChoice"
        leave_policies:
          $ref: "#/components/schemas/LeavePolicySelection"
        claim_categories:
          $ref: "#/components/schemas/ClaimCategorySelection"
        invitations:
          type: array
          items:
            $ref: "#/components/schemas/InvitationInput"
          maxItems: 10

    WorkScheduleChoice:
      type: object
      properties:
        template_id:
          type: string
          format: uuid
          nullable: true
          description: XOR with custom_schedule
        custom_schedule:
          $ref: "#/components/schemas/CustomScheduleInput"
          nullable: true
          description: Only if template_id is null

    CustomScheduleInput:
      type: object
      required: [name, work_days, start_time, end_time]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        work_days:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 7
          minItems: 1
          maxItems: 7
          description: "1=Mon, 2=Tue, ..., 7=Sun"
        start_time:
          type: string
          format: time
          examples: ["08:00"]
        end_time:
          type: string
          format: time
          examples: ["17:00"]

    LeavePolicySelection:
      type: object
      required: [template_ids]
      properties:
        template_ids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
        customizations:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/LeavePolicyCustomization"

    LeavePolicyCustomization:
      type: object
      properties:
        days_per_year:
          type: number
          format: float

    ClaimCategorySelection:
      type: object
      required: [template_ids]
      properties:
        template_ids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
        customizations:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ClaimCategoryCustomization"

    ClaimCategoryCustomization:
      type: object
      properties:
        monthly_limit:
          type: integer
          format: int64

    InvitationInput:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, member, hr_admin, manager, finance]

    CompleteSetupResponse:
      type: object
      properties:
        success:
          type: boolean
        work_schedule_id:
          type: string
          format: uuid
        leave_policy_ids:
          type: array
          items:
            type: string
            format: uuid
        claim_category_ids:
          type: array
          items:
            type: string
            format: uuid
        invitation_ids:
          type: array
          items:
            type: string
            format: uuid

    # ── Employee ──────────────────────────────────────────────────────────
    Employee:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
          nullable: true
        employee_code:
          type: string
          nullable: true
        full_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        department_id:
          type: string
          format: uuid
          nullable: true
        reporting_to:
          type: string
          format: uuid
          nullable: true
          description: Manager's employee ID (for org chart and approval routing)
        manager_name:
          type: string
          nullable: true
          description: Full name of the manager (reporting_to employee). Only populated in list responses.
        work_schedule_name:
          type: string
          nullable: true
          description: Resolved work schedule name (employee override or org default). Only populated in list responses.
        job_title:
          type: string
          nullable: true
        employment_type:
          type: string
          enum: [full_time, part_time, contract, intern]
        status:
          type: string
          enum: [active, on_leave, probation, inactive]
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
          nullable: true
        base_salary:
          type: integer
          format: int64
          nullable: true
          description: Smallest currency unit (e.g. IDR has no sub-units)
        salary_currency:
          type: string
          nullable: true
          examples: ["IDR", "AED"]
        custom_fields:
          type: object
          nullable: true
          description: Pro-only arbitrary key/value metadata
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateEmployeeRequest:
      type: object
      required: [full_name, email, employment_type, start_date]
      properties:
        full_name:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        phone:
          type: string
          maxLength: 30
        department_id:
          type: string
          format: uuid
        reporting_to:
          type: string
          format: uuid
          description: Manager's employee ID
        job_title:
          type: string
          maxLength: 150
        employment_type:
          type: string
          enum: [full_time, part_time, contract, intern]
        start_date:
          type: string
          format: date
          description: "YYYY-MM-DD"
        employee_code:
          type: string
          maxLength: 50

    UpdateEmployeeRequest:
      type: object
      properties:
        full_name:
          type: string
          minLength: 1
          maxLength: 255
        phone:
          type: string
          maxLength: 30
        department_id:
          type: string
          format: uuid
        reporting_to:
          type: string
          format: uuid
          description: Manager's employee ID
        job_title:
          type: string
          maxLength: 150
        employment_type:
          type: string
          enum: [full_time, part_time, contract, intern]
        status:
          type: string
          enum: [active, on_leave, probation, inactive]
        end_date:
          type: string
          format: date

    OrgChartNode:
      type: object
      description: Hierarchical node for organizational chart with recursive direct reports
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
        job_title:
          type: string
          nullable: true
        department_id:
          type: string
          format: uuid
          nullable: true
        employment_type:
          type: string
          enum: [full_time, part_time, contract, intern]
        status:
          type: string
          enum: [active, on_leave, probation, inactive]
        reporting_to:
          type: string
          format: uuid
          nullable: true
          description: Manager's employee ID (null for top-level executives)
        direct_reports:
          type: array
          description: Employees who report directly to this person
          items:
            $ref: "#/components/schemas/OrgChartNode"

    EmployeeWorkload:
      type: object
      description: Employee workload information for task assignment
      required: [employee_id, full_name, workload, leave]
      properties:
        employee_id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
          nullable: true
        department_id:
          type: string
          format: uuid
          nullable: true
        workload:
          $ref: "#/components/schemas/WorkloadInfo"
        leave:
          $ref: "#/components/schemas/LeaveInfo"

    WorkloadInfo:
      type: object
      description: Task workload metrics
