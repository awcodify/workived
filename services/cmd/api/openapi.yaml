  /admin/configs:
    get:
      operationId: listAdminConfigs
      summary: List all admin configurations
      description: Super admin only
      tags: [Admin]
      responses:
        "200":
          description: List of admin configs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminConfig"

  /admin/configs/{key}:
    parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
    patch:
      operationId: updateAdminConfig
      summary: Update an admin configuration
      description: Super admin only
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  type: string
      responses:
        "200":
          description: Config updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AdminConfig"

  # ── Features ──────────────────────────────────────────────────────────────
  /features:
    get:
      operationId: getEnabledFeatures
      summary: Get enabled features for the organisation
      tags: [Features]
      responses:
        "200":
          description: Enabled features
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties:
                      type: boolean
                    example:
                      reports: true
                      tasks: false

# ── Components ────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from `/auth/login`

  parameters:
    ResourceID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  # ── Reusable responses ──────────────────────────────────────────────────
  responses:
    MessageResponse:
      description: Generic success message
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  message:
                    type: string
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    UnauthorizedError:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ForbiddenError:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ConflictError:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  # ── Schemas ─────────────────────────────────────────────────────────────
  schemas:
    # ── Shared ────────────────────────────────────────────────────────────
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/AppError"

    AppError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - NOT_FOUND
            - UNAUTHORIZED
            - FORBIDDEN
            - VALIDATION_ERROR
            - UPGRADE_REQUIRED
            - EMPLOYEE_LIMIT_REACHED
            - CONFLICT
            - INTERNAL_ERROR
          examples:
            - VALIDATION_ERROR
        message:
          type: string
          examples:
            - "email is required"
        field:
          type: string
          examples:
            - "email"

    PaginationMeta:
      type: object
      required: [has_more, limit]
      properties:
        next_cursor:
          type: string
          description: Pass this as `?cursor=` to fetch the next page
        has_more:
          type: boolean
        limit:
          type: integer

    # ── Auth ──────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        is_verified:
          type: boolean
        is_active:
          type: boolean
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [email, password, full_name]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 72
        full_name:
          type: string
          minLength: 1
          maxLength: 255

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Only needed if the httpOnly cookie is absent

    RefreshResponse:
      type: object
      properties:
        access_token:
          type: string

    VerifyEmailRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string

    # ── Organisation ──────────────────────────────────────────────────────
    Organisation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        country_code:
          type: string
          description: ISO 3166-1 alpha-2
          examples: ["ID", "AE"]
        timezone:
          type: string
          examples: ["Asia/Jakarta", "Asia/Dubai"]
        currency_code:
          type: string
          description: ISO 4217
          examples: ["IDR", "AED"]
        work_days:
          type: array
          items:
            type: integer
          description: "0=Sun, 1=Mon, ..., 6=Sat"
          examples: [[1, 2, 3, 4, 5]]
        plan:
          type: string
          enum: [free, pro]
        plan_employee_limit:
          type: integer
          nullable: true
          description: "null for Pro (unlimited), 25 for Free"
        logo_url:
          type: string
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    CreateOrgRequest:
      type: object
      required: [name, slug, country_code, timezone, currency_code]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        slug:
          type: string
          minLength: 2
          maxLength: 100
          pattern: "^[a-zA-Z0-9]+$"
        country_code:
          type: string
          minLength: 2
          maxLength: 2
        timezone:
          type: string
          maxLength: 50
        currency_code:
          type: string
          minLength: 3
          maxLength: 3

    InviteMemberRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        role:
          type: string
          enum: [admin, member]

    # ── Employee ──────────────────────────────────────────────────────────
    Employee:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
          nullable: true
        employee_code:
          type: string
          nullable: true
        full_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        department_id:
          type: string
          format: uuid
          nullable: true
        reporting_to:
          type: string
          format: uuid
          nullable: true
          description: Manager's employee ID (for org chart and approval routing)
        manager_name:
          type: string
          nullable: true
          description: Full name of the manager (reporting_to employee). Only populated in list responses.
        job_title:
          type: string
          nullable: true
        employment_type:
          type: string
          enum: [full_time, part_time, contract, intern]
        status:
          type: string
          enum: [active, on_leave, probation, inactive]
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
          nullable: true
        base_salary:
          type: integer
          format: int64
          nullable: true
          description: Smallest currency unit (e.g. IDR has no sub-units)
        salary_currency:
          type: string
          nullable: true
          examples: ["IDR", "AED"]
        custom_fields:
          type: object
          nullable: true
          description: Pro-only arbitrary key/value metadata
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateEmployeeRequest:
      type: object
      required: [full_name, email, employment_type, start_date]
      properties:
        full_name:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        phone:
          type: string
          maxLength: 30
        department_id:
          type: string
          format: uuid
        reporting_to:
          type: string
          format: uuid
          description: Manager's employee ID
        job_title:
          type: string
          maxLength: 150
        employment_type:
          type: string
          enum: [full_time, part_time, contract, intern]
        start_date:
          type: string
          format: date
          description: "YYYY-MM-DD"
        employee_code:
          type: string
          maxLength: 50

    UpdateEmployeeRequest:
      type: object
      properties:
        full_name:
          type: string
          minLength: 1
          maxLength: 255
        phone:
          type: string
          maxLength: 30
        department_id:
          type: string
          format: uuid
        reporting_to:
          type: string
          format: uuid
          description: Manager's employee ID
        job_title:
          type: string
          maxLength: 150
        employment_type:
          type: string
          enum: [full_time, part_time, contract, intern]
        status:
          type: string
          enum: [active, on_leave, probation, inactive]
        end_date:
          type: string
          format: date

    OrgChartNode:
      type: object
      description: Hierarchical node for organizational chart with recursive direct reports
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
        job_title:
          type: string
          nullable: true
        department_id:
          type: string
          format: uuid
          nullable: true
        employment_type:
          type: string
          enum: [full_time, part_time, contract, intern]
        status:
          type: string
          enum: [active, on_leave, probation, inactive]
        reporting_to:
          type: string
          format: uuid
          nullable: true
          description: Manager's employee ID (null for top-level executives)
        direct_reports:
          type: array
          description: Employees who report directly to this person
          items:
            $ref: "#/components/schemas/OrgChartNode"

    EmployeeWorkload:
      type: object
      description: Employee workload information for task assignment
      required: [employee_id, full_name, workload, leave]
      properties:
        employee_id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
          nullable: true
        department_id:
          type: string
          format: uuid
          nullable: true
        workload:
          $ref: "#/components/schemas/WorkloadInfo"
        leave:
          $ref: "#/components/schemas/LeaveInfo"

    WorkloadInfo:
      type: object
      description: Task workload metrics
      required: [active_tasks, overdue_tasks, status]
      properties:
        active_tasks:
          type: integer
          description: Count of incomplete tasks assigned to employee
        overdue_tasks:
          type: integer
          description: Count of tasks past due date and not completed
        status:
          type: string
          enum: [available, warning, overloaded, on_leave]
          description: |
            Workload level:
            - available: 0-5 active tasks
            - warning: 6-10 active tasks
            - overloaded: 11+ active tasks
            - on_leave: Currently on approved leave

    LeaveInfo:
      type: object
      description: Current and upcoming leave information
      required: [is_on_leave, is_upcoming_leave]
      properties:
        is_on_leave:
          type: boolean
          description: True if employee is currently on approved leave
        is_upcoming_leave:
          type: boolean
          description: True if employee has approved leave in the next 7 days
        leave_start:
          type: string
          format: date-time
          nullable: true
          description: Start date of current or upcoming leave
        leave_end:
          type: string
          format: date-time
          nullable: true
          description: End date of current or upcoming leave

    # ── Department ────────────────────────────────────────────────────────
    Department:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        name:
          type: string
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: Parent department for hierarchy
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateDepartmentRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
        parent_id:
          type: string
          format: uuid

    UpdateDepartmentRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
        parent_id:
          type: string
          format: uuid

    # ── Organisation (Additional) ─────────────────────────────────────────
    Invitation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, hr_admin, employee]
        invited_by:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, accepted, expired, revoked]
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    Member:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          type: string
          enum: [owner, admin, hr_admin, employee]
        employee_id:
          type: string
          format: uuid
          nullable: true
        joined_at:
          type: string
          format: date-time

    # ── Leave ─────────────────────────────────────────────────────────────
    LeavePolicy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        name:
          type: string
        days_per_year:
          type: number
          format: float
        is_carry_over_allowed:
          type: boolean
        max_carry_over_days:
          type: number
          format: float
        is_accrued:
          type: boolean
        requires_approval:
          type: boolean
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateLeavePolicyRequest:
      type: object
      required: [name, days_per_year]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        days_per_year:
          type: number
          format: float
          minimum: 0
          maximum: 999
        is_carry_over_allowed:
          type: boolean
        max_carry_over_days:
          type: number
          format: float
          minimum: 0
        is_accrued:
          type: boolean
        requires_approval:
          type: boolean

    UpdateLeavePolicyRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        days_per_year:
          type: number
          format: float
          minimum: 0
          maximum: 999
        is_carry_over_allowed:
          type: boolean
        max_carry_over_days:
          type: number
          format: float
        is_accrued:
          type: boolean
        requires_approval:
          type: boolean

    LeavePolicyTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        country_code:
          type: string
          enum: [ID, AE, MY, SG]
        name:
          type: string
        description:
          type: string
        entitled_days_per_year:
          type: number
          format: float
        is_carry_over_allowed:
          type: boolean
        max_carry_over_days:
          type: number
          format: float
        is_accrued:
          type: boolean
        requires_approval:
          type: boolean
        sort_order:
          type: integer

    ImportPoliciesRequest:
      type: object
      required: [template_ids]
      properties:
        template_ids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1

    LeaveBalanceWithPolicy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        employee_id:
          type: string
          format: uuid
        employee_name:
          type: string
        leave_policy_id:
          type: string
          format: uuid
        policy_name:
          type: string
        year:
          type: integer
        entitled_days:
          type: number
          format: float
        carried_over_days:
          type: number
          format: float
        used_days:
          type: number
          format: float
        pending_days:
          type: number
          format: float

    LeaveRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        employee_id:
          type: string
          format: uuid
        leave_policy_id:
          type: string
          format: uuid
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        total_days:
          type: number
          format: float
        reason:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, approved, rejected, cancelled]
        reviewed_by:
          type: string
          format: uuid
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        review_note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    LeaveRequestWithDetails:
      allOf:
        - $ref: "#/components/schemas/LeaveRequest"
        - type: object
          properties:
            employee_name:
              type: string
            policy_name:
              type: string

    SubmitLeaveRequestInput:
      type: object
      required: [leave_policy_id, start_date, end_date]
      properties:
        leave_policy_id:
          type: string
          format: uuid
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        reason:
          type: string

    LeaveCalendarEntry:
      type: object
      properties:
        employee_id:
          type: string
          format: uuid
        employee_name:
          type: string
        leave_policy_id:
          type: string
          format: uuid
        policy_name:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        total_days:
          type: number
          format: float

    PublicHoliday:
      type: object
      properties:
        id:
          type: string
          format: uuid
        country_code:
          type: string
          enum: [ID, AE, MY, SG]
        name:
          type: string
        date:
          type: string
          format: date
        is_recurring:
          type: boolean

    # ── Claims ────────────────────────────────────────────────────────────
    ClaimCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        name:
          type: string
        monthly_limit:
          type: integer
          nullable: true
          description: Pro tier monthly limit in smallest currency unit
        currency_code:
          type: string
          nullable: true
          minLength: 3
          maxLength: 3
        requires_receipt:
          type: boolean
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateClaimCategoryRequest:
      type: object
      required: [name, requires_receipt]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        monthly_limit:
          type: integer
          description: Pro tier only - monthly limit per employee
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
        requires_receipt:
          type: boolean

    UpdateClaimCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        monthly_limit:
          type: integer
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
        requires_receipt:
          type: boolean

    ClaimCategoryTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        default_limit:
          type: integer
          nullable: true
          description: Suggested monthly limit
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
        requires_receipt:
          type: boolean
        country_code:
          type: string
          nullable: true
          description: Country this template is tailored for (ID, AE, MY, SG)
        description:
          type: string
          nullable: true

    ClaimBalanceWithCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        employee_id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
        year:
          type: integer
        month:
          type: integer
        total_spent:
          type: integer
          description: Total amount spent in smallest currency unit
        claim_count:
          type: integer
          description: Number of claims submitted
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
        monthly_limit:
          type: integer
          nullable: true
          description: Monthly budget limit (null = unlimited)
        remaining:
          type: integer
          nullable: true
          description: Calculated remaining budget (null if no limit)
        category_name:
          type: string
          description: Name of the category
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Claim:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        employee_id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
        amount:
          type: integer
          description: Amount in smallest currency unit
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
        description:
          type: string
        claim_date:
          type: string
          format: date
        receipt_url:
          type: string
          nullable: true
          description: Presigned S3 URL (15min expiry) or S3 key
        status:
          type: string
          enum: [pending, approved, rejected, cancelled]
        reviewed_by:
          type: string
          format: uuid
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        review_note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ClaimWithDetails:
      allOf:
        - $ref: "#/components/schemas/Claim"
        - type: object
          properties:
            employee_name:
              type: string
            category_name:
              type: string

    ClaimMonthlySummary:
      type: object
      properties:
        employee_id:
          type: string
          format: uuid
        employee_name:
          type: string
        total_amount:
          type: integer
          description: Total claimed in smallest currency unit
        claim_count:
          type: integer
        currency_code:
          type: string

    # ── Tasks ─────────────────────────────────────────────────────────────
    TaskList:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        name:
          type: string
        position:
          type: integer
          description: Position for ordering lists
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateTaskListRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100

    UpdateTaskListRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        position:
          type: integer

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        task_list_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        assignee_id:
          type: string
          format: uuid
          nullable: true
        created_by:
          type: string
          format: uuid
        priority:
          type: string
          enum: [low, medium, high, urgent]
        due_date:
          type: string
          format: date
          nullable: true
        position:
          type: integer
          description: Position within the list
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TaskWithDetails:
      allOf:
        - $ref: "#/components/schemas/Task"
        - type: object
          properties:
            assignee_name:
              type: string
              nullable: true
            creator_name:
              type: string
            list_name:
              type: string

    CreateTaskRequest:
      type: object
      required: [task_list_id, title]
      properties:
        task_list_id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
          maxLength: 5000
        assignee_id:
          type: string
          format: uuid
        priority:
          type: string
          enum: [low, medium, high, urgent]
          default: medium
        due_date:
          type: string
          format: date
          description: Due date in YYYY-MM-DD format (e.g., "2026-03-27")

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
          maxLength: 5000
        assignee_id:
          type: string
          format: uuid
        priority:
          type: string
          enum: [low, medium, high, urgent]
        due_date:
          type: string
          format: date
          description: Due date in YYYY-MM-DD format (e.g., "2026-03-27")

    MoveTaskRequest:
      type: object
      required: [task_list_id, position]
      properties:
        task_list_id:
          type: string
          format: uuid
        position:
          type: integer
          minimum: 0

    TaskComment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        author_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: ID of parent comment (for nested replies)
        body:
          type: string
        content_type:
          type: string
          enum: [plain, markdown]
          default: plain
          description: Content type of the comment body
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TaskCommentWithAuthor:
      allOf:
        - $ref: "#/components/schemas/TaskComment"
        - type: object
          properties:
            author_name:
              type: string
            replies:
              type: array
              items:
                $ref: "#/components/schemas/TaskCommentWithAuthor"
              description: Nested reply comments (max depth 2)

    CreateTaskCommentRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 5000
        parent_id:
          type: string
          format: uuid
          description: ID of parent comment (for nested replies, max depth 2)
        content_type:
          type: string
          enum: [plain, markdown]
          default: plain
          description: Content type of the comment body

    CommentReactionSummary:
      type: object
      properties:
        emoji:
          type: string
          description: The emoji character
          example: "👍"
        count:
          type: integer
          minimum: 1
          description: Number of users who reacted with this emoji
        user_reacted:
          type: boolean
          description: Whether the current user has reacted with this emoji

    # ── Attendance ────────────────────────────────────────────────────────
    AttendanceRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        employee_id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        clock_in_at:
          type: string
          format: date-time
        clock_out_at:
          type: string
          format: date-time
          nullable: true
        note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    DailyAttendanceEntry:
      type: object
      properties:
        employee_id:
          type: string
          format: uuid
        employee_name:
          type: string
        status:
          type: string
          enum: [present, late, absent]
        clock_in_at:
          type: string
          format: date-time
          nullable: true
        clock_out_at:
          type: string
          format: date-time
          nullable: true
        note:
          type: string
          nullable: true

    MonthlySummary:
      type: object
      properties:
        employee_id:
          type: string
          format: uuid
        employee_name:
          type: string
        year:
          type: integer
        month:
          type: integer
        total_present:
          type: integer
        total_late:
          type: integer
        total_absent:
          type: integer
        total_working_days:
          type: integer

    # ── Admin ─────────────────────────────────────────────────────────────
    SystemStats:
      type: object
      properties:
        total_organisations:
          type: integer
        total_users:
          type: integer
        total_employees:
          type: integer
        active_pro_licenses:
          type: integer

    FeatureFlag:
      type: object
      properties:
        key:
          type: string
        name:
          type: string
        description:
          type: string
        is_enabled:
          type: boolean
        updated_by:
          type: string
          format: uuid
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    UpdateFeatureFlagRequest:
      type: object
      required: [is_enabled]
      properties:
        is_enabled:
          type: boolean

    ProLicense:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, expired, revoked]
        valid_from:
          type: string
          format: date
        valid_until:
          type: string
          format: date
        max_employees:
          type: integer
        issued_by:
          type: string
          format: uuid
        revoked_by:
          type: string
          format: uuid
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    CreateProLicenseRequest:
      type: object
      required: [organisation_id, valid_from, valid_until, max_employees]
      properties:
        organisation_id:
          type: string
          format: uuid
        valid_from:
          type: string
          format: date
        valid_until:
          type: string
          format: date
        max_employees:
          type: integer
          minimum: 1

    UpdateProLicenseRequest:
      type: object
      properties:
        status:
          type: string
          enum: [active, expired, revoked]
        valid_until:
          type: string
          format: date
        max_employees:
          type: integer
          minimum: 1

    AdminConfig:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
        description:
          type: string
        updated_by:
          type: string
          format: uuid
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

