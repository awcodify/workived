              properties:
                review_note:
                  type: string
                  minLength: 1
                  maxLength: 500
      responses:
        "200":
          description: Claim rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Claim"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /claims/{id}/cancel:
