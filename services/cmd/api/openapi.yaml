openapi: "3.1.0"
info:
  title: Workived API
  version: "1.0"
  description: HR and operations superapp for SMB founders in Indonesia and UAE.
  contact:
    name: Workived
    email: support@workived.com

servers:
  - url: http://localhost:8080/api/v1
    description: Local development
  - url: https://stg-api.workived.com/v1
    description: Staging
  - url: https://api.workived.com/v1
    description: Production

security:
  - BearerAuth: []

# ── Paths ─────────────────────────────────────────────────────────────────────

paths:
  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: registerUser
      summary: Register a new user account
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /auth/login:
    post:
      operationId: loginUser
      summary: Log in and obtain an access token
      description: |
        Returns an access token in the response body and sets a `refresh_token`
        httpOnly cookie for silent refresh.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              description: httpOnly refresh_token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh the access token
      description: |
        Reads the refresh token from the httpOnly cookie. Falls back to the
        request body if the cookie is absent.
      tags: [Auth]
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RefreshResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/logout:
    post:
      operationId: logoutUser
      summary: Log out and invalidate the refresh token
      tags: [Auth]
      security: []
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      summary: Verify a user's email address
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      summary: Request a password reset email
      description: Always returns 200 — never reveals whether the email is registered.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /auth/reset-password:
    post:
      operationId: resetPassword
      summary: Reset password using a token from the reset email
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  # ── Organisations ─────────────────────────────────────────────────────────
  /organisations:
    post:
      operationId: createOrganisation
      summary: Create a new organisation
      tags: [Organisations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrgRequest"
      responses:
        "201":
          description: Organisation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Organisation"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /organisations/me:
    get:
      operationId: getMyOrganisation
      summary: Get the authenticated user's organisation
      tags: [Organisations]
      responses:
        "200":
          description: Organisation details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Organisation"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /organisations/invitations:
    get:
      operationId: listPendingInvitations
      summary: List pending invitations
      tags: [Organisations]
      responses:
        "200":
          description: List of pending invitations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Invitation"

    post:
      operationId: inviteMember
      summary: Invite a member to the organisation
      description: Requires `owner` or `admin` role.
      tags: [Organisations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberRequest"
      responses:
        "201":
          $ref: "#/components/responses/MessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /organisations/invitations/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    delete:
      operationId: revokeInvitation
      summary: Revoke an invitation
      tags: [Organisations]
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /organisations/members:
    get:
      operationId: listMembers
      summary: List all organisation members
      tags: [Organisations]
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Member"

  /organisations/members/unlinked:
    get:
      operationId: listUnlinkedMembers
      summary: List members without linked employee records
      tags: [Organisations]
      responses:
        "200":
          description: List of unlinked members
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Member"

  /organisations/members/{id}:
    patch:
      operationId: updateMemberRole
      summary: Update a member's role
      description: Update the role of an organisation member. Cannot change own role or the owner's role.
      tags: [Organisations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Member ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, member, hr_admin, manager, finance]
                  description: New role for the member
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "426":
          $ref: "#/components/responses/UpgradeRequiredError"

  /organisations/me/transfer-ownership:
    post:
      operationId: transferOwnership
      summary: Transfer organisation ownership
      description: Only current owner can perform this action
      tags: [Organisations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_owner_id]
              properties:
                new_owner_id:
                  type: string
                  format: uuid
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /invitations/accept:
    post:
      operationId: acceptInvitation
      summary: Accept an organisation invitation
      tags: [Organisations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Invitation accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      organisation:
                        $ref: "#/components/schemas/Organisation"
                      member:
                        $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /invitations/mine:
    get:
      operationId: getMyInvitations
      summary: Get my pending invitations
      tags: [Organisations]
      responses:
        "200":
          description: List of my invitations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Invitation"

  # ── Employees ─────────────────────────────────────────────────────────────
  /employees:
    get:
      operationId: listEmployees
      summary: List employees
      tags: [Employees]
      parameters:
        - name: cursor
          in: query
          description: Opaque pagination cursor from a previous response
          schema:
            type: string
        - name: limit
          in: query
          description: "Page size (default: 20, max: 100)"
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: status
          in: query
          description: Filter by employment status
          schema:
            type: string
            enum: [active, on_leave, probation, inactive]
        - name: department_id
          in: query
          description: Filter by department UUID
          schema:
            type: string
            format: uuid
        - name: schedule_id
          in: query
          description: Filter by work schedule UUID (resolves employee override or org default)
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Paginated employee list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Employee"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

    post:
      operationId: createEmployee
      summary: Create a new employee
      tags: [Employees]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeRequest"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Employee"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: Duplicate email or phone number (includes existing employee name)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "402":
          description: Free plan employee limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /employees/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"

    get:
      operationId: getEmployee
      summary: Get a single employee by ID
      tags: [Employees]
      responses:
        "200":
          description: Employee details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Employee"
        "404":
          $ref: "#/components/responses/NotFoundError"

    put:
      operationId: updateEmployee
      summary: Update an employee
      tags: [Employees]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeRequest"
      responses:
        "200":
          description: Employee updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Employee"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    delete:
      operationId: deactivateEmployee
      summary: Deactivate (soft-delete) an employee
      tags: [Employees]
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /employees/{id}/directs:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    get:
      operationId: getDirectReports
      summary: Get direct reports for a manager
      description: Returns all employees who report to the specified manager
      tags: [Employees]
      responses:
        "200":
          description: List of direct reports
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Employee"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /employees/workload:
    get:
      operationId: getEmployeeWorkload
      summary: Get workload information for all active employees
      description: |
        Returns workload intelligence for workload-aware task assignment.
        Includes task counts, overdue tasks, leave status, and workload level.
      tags: [Employees]
      responses:
        "200":
          description: Workload information for all active employees
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/EmployeeWorkload"

  /employees/org-chart:
    get:
      operationId: getOrgChart
      summary: Get organizational chart
      description: Returns hierarchical org structure with all active employees
      tags: [Employees]
      responses:
        "200":
          description: Organizational chart tree (roots are employees without managers)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrgChartNode"

  # ── Setup Wizard ───────────────────────────────────────────────────────────
  /setup/status:
    get:
      operationId: getSetupStatus
      summary: Get setup wizard status
      description: Retrieves the current state of the organization setup wizard
      tags: [Setup]
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SetupStatus"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"

  /setup/templates:
    get:
      operationId: getSetupTemplates
      summary: Get setup wizard templates
      description: Retrieves all available templates for the organization's country (work schedules, leave policies, claim categories)
      tags: [Setup]
      responses:
        "200":
          description: Available templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SetupTemplatesResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalError"

  /setup/complete:
    post:
      operationId: completeSetup
      summary: Complete setup wizard
      description: Processes all setup wizard choices in a single transaction (work schedule, leave policies, claim categories, team invitations)
      tags: [Setup]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteSetupRequest"
      responses:
        "201":
          description: Setup completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CompleteSetupResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalError"

  /setup/skip:
    post:
      operationId: skipSetup
      summary: Skip setup wizard
      description: Marks the setup wizard as skipped to prevent redirect loops
      tags: [Setup]
      responses:
        "200":
          description: Setup skipped successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      skipped:
                        type: boolean
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Departments ───────────────────────────────────────────────────────────
  /departments:
    get:
      operationId: listDepartments
      summary: List departments
      tags: [Departments]
      responses:
        "200":
          description: Department list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Department"

    post:
      operationId: createDepartment
      summary: Create a new department
      tags: [Departments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentRequest"
      responses:
        "201":
          description: Department created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Department"
        "400":
          $ref: "#/components/responses/ValidationError"

  /departments/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"

    put:
      operationId: updateDepartment
      summary: Update a department
      tags: [Departments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDepartmentRequest"
      responses:
        "200":
          description: Department updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Department"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    delete:
      operationId: deactivateDepartment
      summary: Deactivate (soft-delete) a department
      tags: [Departments]
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ── Leave ─────────────────────────────────────────────────────────────────
  /leave/policies:
    get:
      operationId: listLeavePolicies
      summary: List all leave policies
      tags: [Leave]
      responses:
        "200":
          description: List of leave policies
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeavePolicy"
    
    post:
      operationId: createLeavePolicy
      summary: Create a new leave policy
      tags: [Leave]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeavePolicyRequest"
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LeavePolicy"
        "400":
          $ref: "#/components/responses/ValidationError"

  /leave/policies/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    
    put:
      operationId: updateLeavePolicy
      summary: Update a leave policy
      tags: [Leave]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeavePolicyRequest"
      responses:
        "200":
          description: Policy updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LeavePolicy"
        "404":
          $ref: "#/components/responses/NotFoundError"
    
    delete:
      operationId: deactivateLeavePolicy
      summary: Deactivate a leave policy
      tags: [Leave]
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /leave/templates:
    get:
      operationId: listLeaveTemplates
      summary: List leave policy templates for a country
      tags: [Leave]
      parameters:
        - name: country_code
          in: query
          required: false
          schema:
            type: string
            enum: [ID, AE, MY, SG]
          description: Filter by country code (defaults to org country)
      responses:
        "200":
          description: List of leave policy templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeavePolicyTemplate"

  /leave/policies/import:
    post:
      operationId: importLeavePolicies
      summary: Import policies from templates
      description: Creates policies and balances for all active employees atomically
      tags: [Leave]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportPoliciesRequest"
      responses:
        "201":
          description: Policies imported successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      created_count:
                        type: integer
                      policies:
                        type: array
                        items:
                          $ref: "#/components/schemas/LeavePolicy"
        "400":
          $ref: "#/components/responses/ValidationError"

  /leave/balances:
    get:
      operationId: listLeaveBalances
      summary: List all leave balances (admin)
      tags: [Leave]
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of leave balances
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaveBalanceWithPolicy"

  /leave/balances/me:
    get:
      operationId: listMyLeaveBalances
      summary: Get my leave balances
      tags: [Leave]
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: My leave balances
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaveBalanceWithPolicy"

  /leave/requests:
    get:
      operationId: listLeaveRequests
      summary: List leave requests
      description: Admins see all requests. Non-admins only see requests from their direct reports (based on reporting_to relationship).
      tags: [Leave]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, cancelled]
        - name: employee_id
          in: query
          schema:
            type: string
            format: uuid
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of leave requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaveRequestWithDetails"
    
    post:
      operationId: submitLeaveRequest
      summary: Submit a leave request
      description: |
        Submits a new leave request. Organization owners receive automatic approval -
        their requests will immediately return with status='approved' instead of 'pending'.
        All other users' requests remain 'pending' until reviewed by their manager.
      tags: [Leave]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitLeaveRequestInput"
      responses:
