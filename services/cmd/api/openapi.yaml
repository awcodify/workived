# ── Components ────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from `/auth/login`

  parameters:
    ResourceID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  # ── Reusable responses ──────────────────────────────────────────────────
  responses:
    MessageResponse:
      description: Generic success message
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  message:
                    type: string
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    UnauthorizedError:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ForbiddenError:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ConflictError:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  # ── Schemas ─────────────────────────────────────────────────────────────
  schemas:
    # ── Shared ────────────────────────────────────────────────────────────
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/AppError"

    AppError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - NOT_FOUND
            - UNAUTHORIZED
            - FORBIDDEN
            - VALIDATION_ERROR
            - UPGRADE_REQUIRED
            - EMPLOYEE_LIMIT_REACHED
            - CONFLICT
            - INTERNAL_ERROR
          examples:
            - VALIDATION_ERROR
        message:
          type: string
          examples:
            - "email is required"
        field:
          type: string
          examples:
            - "email"

    PaginationMeta:
      type: object
      required: [has_more, limit]
      properties:
        next_cursor:
          type: string
          description: Pass this as `?cursor=` to fetch the next page
        has_more:
          type: boolean
        limit:
          type: integer

    # ── Auth ──────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        is_verified:
          type: boolean
        is_active:
          type: boolean
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [email, password, full_name]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 72
        full_name:
          type: string
          minLength: 1
          maxLength: 255

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Only needed if the httpOnly cookie is absent

    RefreshResponse:
      type: object
      properties:
        access_token:
          type: string

    VerifyEmailRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string

    # ── Organisation ──────────────────────────────────────────────────────
    Organisation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        country_code:
          type: string
          description: ISO 3166-1 alpha-2
          examples: ["ID", "AE"]
        timezone:
          type: string
          examples: ["Asia/Jakarta", "Asia/Dubai"]
        currency_code:
          type: string
          description: ISO 4217
          examples: ["IDR", "AED"]
        work_days:
          type: array
          items:
            type: integer
          description: "0=Sun, 1=Mon, ..., 6=Sat"
          examples: [[1, 2, 3, 4, 5]]
        plan:
          type: string
          enum: [free, pro]
        plan_employee_limit:
          type: integer
          nullable: true
          description: "null for Pro (unlimited), 25 for Free"
        logo_url:
          type: string
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    CreateOrgRequest:
      type: object
      required: [name, slug, country_code, timezone, currency_code]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        slug:
          type: string
          minLength: 2
          maxLength: 100
          pattern: "^[a-zA-Z0-9]+$"
        country_code:
          type: string
          minLength: 2
          maxLength: 2
        timezone:
          type: string
          maxLength: 50
        currency_code:
          type: string
          minLength: 3
          maxLength: 3

    InviteMemberRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        role:
          type: string
          enum: [admin, member]

    # ── Employee ──────────────────────────────────────────────────────────
    Employee:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
          nullable: true
        employee_code:
          type: string
          nullable: true
        full_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        department_id:
          type: string
          format: uuid
          nullable: true
        reporting_to:
          type: string
          format: uuid
          nullable: true
          description: Manager's employee ID (for org chart and approval routing)
        manager_name:
          type: string
          nullable: true
          description: Full name of the manager (reporting_to employee). Only populated in list responses.
        job_title:
          type: string
          nullable: true
        employment_type:
          type: string
          enum: [full_time, part_time, contract, intern]
        status:
          type: string
          enum: [active, on_leave, probation, inactive]
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
          nullable: true
        base_salary:
          type: integer
          format: int64
          nullable: true
          description: Smallest currency unit (e.g. IDR has no sub-units)
        salary_currency:
          type: string
          nullable: true
          examples: ["IDR", "AED"]
        custom_fields:
          type: object
          nullable: true
          description: Pro-only arbitrary key/value metadata
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateEmployeeRequest:
      type: object
      required: [full_name, email, employment_type, start_date]
      properties:
        full_name:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        phone:
          type: string
          maxLength: 30
        department_id:
          type: string
          format: uuid
        reporting_to:
          type: string
          format: uuid
          description: Manager's employee ID
        job_title:
          type: string
          maxLength: 150
        employment_type:
          type: string
          enum: [full_time, part_time, contract, intern]
        start_date:
          type: string
          format: date
          description: "YYYY-MM-DD"
        employee_code:
          type: string
          maxLength: 50

    UpdateEmployeeRequest:
      type: object
      properties:
        full_name:
          type: string
          minLength: 1
          maxLength: 255
        phone:
          type: string
          maxLength: 30
        department_id:
          type: string
          format: uuid
        reporting_to:
          type: string
          format: uuid
          description: Manager's employee ID
        job_title:
          type: string
          maxLength: 150
        employment_type:
          type: string
          enum: [full_time, part_time, contract, intern]
        status:
          type: string
          enum: [active, on_leave, probation, inactive]
        end_date:
          type: string
          format: date

    # ── Department ────────────────────────────────────────────────────────
    Department:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        name:
          type: string
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: Parent department for hierarchy
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateDepartmentRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
        parent_id:
          type: string
          format: uuid

    UpdateDepartmentRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
        parent_id:
          type: string
          format: uuid

    # ── Organisation (Additional) ─────────────────────────────────────────
    Invitation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, hr_admin, employee]
        invited_by:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, accepted, expired, revoked]
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    Member:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          type: string
          enum: [owner, admin, hr_admin, employee]
        employee_id:
