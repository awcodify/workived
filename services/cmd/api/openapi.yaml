  /tasks/fields:
    get:
      operationId: listFieldDefinitions
      summary: List custom field definitions
      description: Returns all active custom field schemas for the organisation
      tags: [Tasks]
      responses:
        "200":
          description: List of field definitions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FieldDefinition"

    post:
      operationId: createFieldDefinition
      summary: Create a custom field definition
      description: Defines a new custom field type for tasks. Requires admin/owner role.
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFieldDefinitionRequest"
      responses:
        "201":
          description: Field definition created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/FieldDefinition"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /tasks/fields/{fid}:
    parameters:
      - name: fid
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Field definition ID

    put:
      operationId: updateFieldDefinition
      summary: Update a custom field definition
      description: Update name, description, options, or config. field_type cannot be changed after creation.
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFieldDefinitionRequest"
      responses:
        "200":
          description: Field definition updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/FieldDefinition"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

    delete:
      operationId: deactivateFieldDefinition
      summary: Deactivate a custom field definition
      description: Soft-deletes the field. Existing values are preserved but the field no longer appears in task forms.
      tags: [Tasks]
      responses:
        "204":
          description: Field definition deactivated
        "404":
          $ref: "#/components/responses/NotFoundError"

  /tasks/{id}/fields/{fid}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Task ID
      - name: fid
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Field definition ID

    put:
      operationId: setTaskFieldValue
      summary: Set a custom field value on a task
      description: Upserts the value for one field. Send multiple requests to set multiple fields on the same task.
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetFieldValueRequest"
      responses:
        "200":
          description: Field value set
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/FieldValueWithDefinition"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    delete:
      operationId: clearTaskFieldValue
      summary: Clear a custom field value from a task
      description: Removes the stored value for one field. The field definition is not affected.
      tags: [Tasks]
      responses:
        "204":
          description: Field value cleared
        "404":
          $ref: "#/components/responses/NotFoundError"

