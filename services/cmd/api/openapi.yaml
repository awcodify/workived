    # ── Dashboard schemas ──────────────────────────────────────────────────
    Dashboard:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        name:
          type: string
        is_default:
          type: boolean
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Widget:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organisation_id:
          type: string
          format: uuid
        dashboard_id:
          type: string
          format: uuid
        title:
          type: string
        widget_type:
          type: string
          enum: [kpi, table, bar, line, divider, text]
        query_config:
          $ref: "#/components/schemas/QueryConfig"
        viz_config:
          $ref: "#/components/schemas/VizConfig"
        position_x:
          type: integer
          minimum: 0
        position_y:
          type: integer
          minimum: 0
        width:
          type: integer
          minimum: 1
          maximum: 12
        height:
          type: integer
          minimum: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    QueryConfig:
      type: object
      properties:
        source:
          type: string
          enum: [tasks, attendance, leave, claims, employees]
        aggregate:
          type: string
          enum: [count, count_distinct, sum, avg, min, max]
        field:
          type: string
          description: Column to aggregate (required for sum/avg/min/max)
        group_by:
          type: string
        facet:
          type: string
          description: Multi-series split for line charts
        date_bucket:
          type: string
          enum: [day, week, month]
        columns:
          type: array
          items:
            type: string
          description: Column list for table widgets
        filters:
          type: array
          items:
            $ref: "#/components/schemas/QueryFilter"
        sort_by:
          type: string
        sort_dir:
          type: string
          enum: [asc, desc]
        limit:
          type: integer
          minimum: 1
          maximum: 1000
        date_range:
          type: string
          description: Date alias (e.g. this_month, last_30_days, this_year)

    QueryFilter:
      type: object
      required: [field, op, value]
      properties:
        field:
          type: string
        op:
          type: string
          enum: [eq, neq, gt, gte, lt, lte, in, is_null, not_null]
        value:
          description: Filter value (string, number, boolean, or array for `in`)

    VizConfig:
      type: object
      properties:
        color:
          type: string
          description: Hex color for the widget accent
        unit:
          type: string
          description: Unit suffix for KPI values (e.g. hrs, %)
        show_delta:
          type: boolean
        compare_with:
          type: string
          enum: [previous_period]
        content:
          type: string
          description: Free-text content for text widgets

    QueryResult:
      type: object
      properties:
        columns:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
        value:
          type: number
          format: double
          description: Scalar value for KPI widgets

    CreateDashboardRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        is_default:
          type: boolean

    Announcement:
      type: object
      properties:
        id:
