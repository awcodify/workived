          format: uuid
        organisation_id:
          type: string
          format: uuid
        author_id:
          type: string
          format: uuid
          nullable: true
          description: "Author employee ID; null for auto-generated announcements"
        author_name:
          type: string
        title:
          type: string
        body:
          type: string
        is_pinned:
          type: boolean
        is_auto:
          type: boolean
          description: "True if announcement was automatically generated (e.g. welcome message)"
        is_read:
          type: boolean
        published_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateAnnouncementRequest:
      type: object
      required: [title, body]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        body:
          type: string
          minLength: 1
        is_pinned:
          type: boolean
          default: false
        publish:
          type: boolean
          default: false

    UpdateAnnouncementRequest:
      type: object
      required: [title, body]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        body:
          type: string
          minLength: 1
        is_pinned:
          type: boolean

    CreateWidgetRequest:
      type: object
      required: [title, widget_type]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        widget_type:
          type: string
          enum: [kpi, table, bar, line, divider, text]
        query_config:
          $ref: "#/components/schemas/QueryConfig"
        viz_config:
          $ref: "#/components/schemas/VizConfig"
        position_x:
          type: integer
          minimum: 0
          default: 0
        position_y:
          type: integer
          minimum: 0
          default: 0
        width:
          type: integer
          minimum: 1
          maximum: 12
          default: 4
        height:
          type: integer
          minimum: 1
          default: 2

