  /claims:
    get:
      operationId: listClaims
      summary: List claims
      description: Admins see all claims. Non-admins only see claims from their direct reports (based on reporting_to relationship).
      tags: [Claims]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, cancelled]
        - name: employee_id
          in: query
          schema:
            type: string
            format: uuid
        - name: category_id
          in: query
          schema:
            type: string
            format: uuid
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated claims list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClaimWithDetails"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

    post:
      operationId: submitClaim
      summary: Submit a new claim
      description: |
        Submits a new expense claim. Supports multipart file upload for receipt.
        Organization owners receive automatic approval - their claims will immediately
        return with status='approved' instead of 'pending'. All other users' claims
        remain 'pending' until reviewed by their manager.
      tags: [Claims]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [category_id, amount, currency_code, description, claim_date]
              properties:
                category_id:
                  type: string
                  format: uuid
                amount:
                  type: integer
                  description: Amount in smallest currency unit
                currency_code:
                  type: string
                  minLength: 3
                  maxLength: 3
                description:
                  type: string
                  maxLength: 500
                claim_date:
                  type: string
                  format: date
                receipt:
                  type: string
                  format: binary
                  description: Optional receipt file (jpg/png/pdf, max 10MB)
      responses:
        "201":
          description: Claim submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Claim"
        "400":
          $ref: "#/components/responses/ValidationError"

  /claims/me:
    get:
      operationId: listMyClaims
      summary: Get my claims
      tags: [Claims]
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: My claims
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClaimWithDetails"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /claims/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"

    get:
      operationId: getClaim
      summary: Get claim details
      description: Returns presigned URL for receipt if available
      tags: [Claims]
      responses:
        "200":
          description: Claim details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ClaimWithDetails"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /claims/{id}/approve:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: approveClaim
      summary: Approve a claim
      description: Requires claims approval permission. Admins can approve any claim. Non-admins can only approve claims from their direct reports (verified via reporting_to relationship).
      tags: [Claims]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                review_note:
                  type: string
                  maxLength: 500
      responses:
        "200":
          description: Claim approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Claim"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /claims/{id}/reject:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: rejectClaim
      summary: Reject a claim
      description: Requires claims approval permission. Admins can reject any claim. Non-admins can only reject claims from their direct reports (verified via reporting_to relationship).
      tags: [Claims]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [review_note]
              properties:
                review_note:
                  type: string
                  minLength: 1
                  maxLength: 500
      responses:
        "200":
          description: Claim rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Claim"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /claims/{id}/cancel:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: cancelClaim
      summary: Cancel own claim
      description: Can only cancel own pending claims
      tags: [Claims]
      responses:
        "200":
          description: Claim cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Claim"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /claims/summary:
    get:
      operationId: getClaimsSummary
