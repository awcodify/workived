openapi: "3.1.0"
info:
  title: Workived API
  version: "1.0"
  description: HR and operations superapp for SMB founders in Indonesia and UAE.
  contact:
    name: Workived
    email: support@workived.com

servers:
  - url: http://localhost:8080/api/v1
    description: Local development

security:
  - BearerAuth: []

# ── Paths ─────────────────────────────────────────────────────────────────────

paths:
  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: registerUser
      summary: Register a new user account
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /auth/login:
    post:
      operationId: loginUser
      summary: Log in and obtain an access token
      description: |
        Returns an access token in the response body and sets a `refresh_token`
        httpOnly cookie for silent refresh.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              description: httpOnly refresh_token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh the access token
      description: |
        Reads the refresh token from the httpOnly cookie. Falls back to the
        request body if the cookie is absent.
      tags: [Auth]
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RefreshResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/logout:
    post:
      operationId: logoutUser
      summary: Log out and invalidate the refresh token
      tags: [Auth]
      security: []
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      summary: Verify a user's email address
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ── Organisations ─────────────────────────────────────────────────────────
  /organisations:
    post:
      operationId: createOrganisation
      summary: Create a new organisation
      tags: [Organisations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrgRequest"
      responses:
        "201":
          description: Organisation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Organisation"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /organisations/me:
    get:
      operationId: getMyOrganisation
      summary: Get the authenticated user's organisation
      tags: [Organisations]
      responses:
        "200":
          description: Organisation details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Organisation"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /organisations/invitations:
    get:
      operationId: listPendingInvitations
      summary: List pending invitations
      tags: [Organisations]
      responses:
        "200":
          description: List of pending invitations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Invitation"

    post:
      operationId: inviteMember
      summary: Invite a member to the organisation
      description: Requires `owner` or `admin` role.
      tags: [Organisations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberRequest"
      responses:
        "201":
          $ref: "#/components/responses/MessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /organisations/invitations/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    delete:
      operationId: revokeInvitation
      summary: Revoke an invitation
      tags: [Organisations]
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /organisations/members:
    get:
      operationId: listMembers
      summary: List all organisation members
      tags: [Organisations]
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Member"

  /organisations/members/unlinked:
    get:
      operationId: listUnlinkedMembers
      summary: List members without linked employee records
      tags: [Organisations]
      responses:
        "200":
          description: List of unlinked members
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Member"

  /organisations/me/transfer-ownership:
    post:
      operationId: transferOwnership
      summary: Transfer organisation ownership
      description: Only current owner can perform this action
      tags: [Organisations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_owner_id]
              properties:
                new_owner_id:
                  type: string
                  format: uuid
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /invitations/accept:
    post:
      operationId: acceptInvitation
      summary: Accept an organisation invitation
      tags: [Organisations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Invitation accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      organisation:
                        $ref: "#/components/schemas/Organisation"
                      member:
                        $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /invitations/mine:
    get:
      operationId: getMyInvitations
      summary: Get my pending invitations
      tags: [Organisations]
      responses:
        "200":
          description: List of my invitations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Invitation"

  # ── Employees ─────────────────────────────────────────────────────────────
  /employees:
    get:
      operationId: listEmployees
      summary: List employees
      tags: [Employees]
      parameters:
        - name: cursor
          in: query
          description: Opaque pagination cursor from a previous response
          schema:
            type: string
        - name: limit
          in: query
          description: "Page size (default: 20, max: 100)"
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: status
          in: query
          description: Filter by employment status
          schema:
            type: string
            enum: [active, on_leave, probation, inactive]
        - name: department_id
          in: query
          description: Filter by department UUID
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Paginated employee list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Employee"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

    post:
      operationId: createEmployee
      summary: Create a new employee
      tags: [Employees]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeRequest"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Employee"
        "400":
          $ref: "#/components/responses/ValidationError"
        "402":
          description: Free plan employee limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /employees/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"

    get:
      operationId: getEmployee
      summary: Get a single employee by ID
      tags: [Employees]
      responses:
        "200":
          description: Employee details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Employee"
        "404":
          $ref: "#/components/responses/NotFoundError"

    put:
      operationId: updateEmployee
      summary: Update an employee
      tags: [Employees]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeRequest"
      responses:
        "200":
          description: Employee updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Employee"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    delete:
      operationId: deactivateEmployee
      summary: Deactivate (soft-delete) an employee
      tags: [Employees]
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /employees/{id}/directs:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    get:
      operationId: getDirectReports
      summary: Get direct reports for a manager
      description: Returns all employees who report to the specified manager
      tags: [Employees]
      responses:
        "200":
          description: List of direct reports
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Employee"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ── Departments ───────────────────────────────────────────────────────────
  /departments:
    get:
      operationId: listDepartments
      summary: List departments
      tags: [Departments]
      responses:
        "200":
          description: Department list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Department"

    post:
      operationId: createDepartment
      summary: Create a new department
      tags: [Departments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentRequest"
      responses:
        "201":
          description: Department created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Department"
        "400":
          $ref: "#/components/responses/ValidationError"

  /departments/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"

    put:
      operationId: updateDepartment
      summary: Update a department
      tags: [Departments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDepartmentRequest"
      responses:
        "200":
          description: Department updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Department"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    delete:
      operationId: deactivateDepartment
      summary: Deactivate (soft-delete) a department
      tags: [Departments]
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ── Leave ─────────────────────────────────────────────────────────────────
  /leave/policies:
    get:
      operationId: listLeavePolicies
      summary: List all leave policies
      tags: [Leave]
      responses:
        "200":
          description: List of leave policies
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeavePolicy"
    
    post:
      operationId: createLeavePolicy
      summary: Create a new leave policy
      tags: [Leave]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeavePolicyRequest"
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LeavePolicy"
        "400":
          $ref: "#/components/responses/ValidationError"

  /leave/policies/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    
    put:
      operationId: updateLeavePolicy
      summary: Update a leave policy
      tags: [Leave]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeavePolicyRequest"
      responses:
        "200":
          description: Policy updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LeavePolicy"
        "404":
          $ref: "#/components/responses/NotFoundError"
    
    delete:
      operationId: deactivateLeavePolicy
      summary: Deactivate a leave policy
      tags: [Leave]
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /leave/templates:
    get:
      operationId: listLeaveTemplates
      summary: List leave policy templates for a country
      tags: [Leave]
      parameters:
        - name: country_code
          in: query
          required: false
          schema:
            type: string
            enum: [ID, AE, MY, SG]
          description: Filter by country code (defaults to org country)
      responses:
        "200":
          description: List of leave policy templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeavePolicyTemplate"

  /leave/policies/import:
    post:
      operationId: importLeavePolicies
      summary: Import policies from templates
      description: Creates policies and balances for all active employees atomically
      tags: [Leave]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportPoliciesRequest"
      responses:
        "201":
          description: Policies imported successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      created_count:
                        type: integer
                      policies:
                        type: array
                        items:
                          $ref: "#/components/schemas/LeavePolicy"
        "400":
          $ref: "#/components/responses/ValidationError"

  /leave/balances:
    get:
      operationId: listLeaveBalances
      summary: List all leave balances (admin)
      tags: [Leave]
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of leave balances
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaveBalanceWithPolicy"

  /leave/balances/me:
    get:
      operationId: listMyLeaveBalances
      summary: Get my leave balances
      tags: [Leave]
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: My leave balances
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaveBalanceWithPolicy"

  /leave/requests:
    get:
      operationId: listLeaveRequests
      summary: List leave requests (admin)
      tags: [Leave]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, cancelled]
        - name: employee_id
          in: query
          schema:
            type: string
            format: uuid
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of leave requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaveRequestWithDetails"
    
    post:
      operationId: submitLeaveRequest
      summary: Submit a leave request
      tags: [Leave]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitLeaveRequestInput"
      responses:
        "201":
          description: Request submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LeaveRequest"
        "400":
          $ref: "#/components/responses/ValidationError"

  /leave/requests/me:
    get:
      operationId: listMyLeaveRequests
      summary: Get my leave requests
      tags: [Leave]
      responses:
        "200":
          description: My leave requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaveRequestWithDetails"

  /leave/requests/{id}/approve:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: approveLeaveRequest
      summary: Approve a leave request
      tags: [Leave]
      responses:
        "200":
          description: Request approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LeaveRequest"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /leave/requests/{id}/reject:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: rejectLeaveRequest
      summary: Reject a leave request
      tags: [Leave]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
      responses:
        "200":
          description: Request rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LeaveRequest"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /leave/requests/{id}/cancel:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: cancelLeaveRequest
      summary: Cancel own leave request
      tags: [Leave]
      responses:
        "200":
          description: Request cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LeaveRequest"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /leave/calendar:
    get:
      operationId: getLeaveCalendar
      summary: Get leave calendar for a month
      tags: [Leave]
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
      responses:
        "200":
          description: Leave calendar entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaveCalendarEntry"

  /leave/holidays:
    get:
      operationId: listPublicHolidays
      summary: List public holidays for date range
      tags: [Leave]
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of public holidays
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PublicHoliday"

  /leave/notifications/count:
    get:
      operationId: getLeaveNotificationCount
      summary: Get pending leave requests count
      tags: [Leave]
      responses:
        "200":
          description: Notification count
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      count:
                        type: integer

  # ── Claims ────────────────────────────────────────────────────────────────
  /claims/categories:
    get:
      operationId: listClaimCategories
      summary: List all claim categories
      tags: [Claims]
      responses:
        "200":
          description: List of claim categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClaimCategory"

    post:
      operationId: createClaimCategory
      summary: Create a new claim category
      description: Requires admin role
      tags: [Claims]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClaimCategoryRequest"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ClaimCategory"
        "400":
          $ref: "#/components/responses/ValidationError"

  /claims/categories/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"

    put:
      operationId: updateClaimCategory
      summary: Update a claim category
      description: Requires admin role
      tags: [Claims]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClaimCategoryRequest"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ClaimCategory"
        "404":
          $ref: "#/components/responses/NotFoundError"

    delete:
      operationId: deactivateClaimCategory
      summary: Deactivate a claim category
      description: Cannot deactivate if there are pending claims
      tags: [Claims]
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /claims:
    get:
      operationId: listClaims
      summary: List all claims (admin)
      tags: [Claims]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, cancelled]
        - name: employee_id
          in: query
          schema:
            type: string
            format: uuid
        - name: category_id
          in: query
          schema:
            type: string
            format: uuid
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated claims list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClaimWithDetails"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

    post:
      operationId: submitClaim
      summary: Submit a new claim
      description: Supports multipart file upload for receipt
      tags: [Claims]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [category_id, amount, currency_code, description, claim_date]
              properties:
                category_id:
                  type: string
                  format: uuid
                amount:
                  type: integer
                  description: Amount in smallest currency unit
                currency_code:
                  type: string
                  minLength: 3
                  maxLength: 3
                description:
                  type: string
                  maxLength: 500
                claim_date:
                  type: string
                  format: date
                receipt:
                  type: string
                  format: binary
                  description: Optional receipt file (jpg/png/pdf, max 10MB)
      responses:
        "201":
          description: Claim submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Claim"
        "400":
          $ref: "#/components/responses/ValidationError"

  /claims/me:
    get:
      operationId: listMyClaims
      summary: Get my claims
      tags: [Claims]
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: My claims
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClaimWithDetails"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /claims/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"

    get:
      operationId: getClaim
      summary: Get claim details
      description: Returns presigned URL for receipt if available
      tags: [Claims]
      responses:
        "200":
          description: Claim details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ClaimWithDetails"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /claims/{id}/approve:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: approveClaim
      summary: Approve a claim
      description: Requires claims approval permission
      tags: [Claims]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                review_note:
                  type: string
                  maxLength: 500
      responses:
        "200":
          description: Claim approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Claim"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /claims/{id}/reject:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: rejectClaim
      summary: Reject a claim
      description: Requires claims approval permission
      tags: [Claims]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [review_note]
              properties:
