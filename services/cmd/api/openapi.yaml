        schema:
          type: string
          format: uuid

    get:
      operationId: listTaskComments
      summary: List comments on a task
      tags: [Tasks]
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TaskCommentWithAuthor"

    post:
      operationId: createTaskComment
      summary: Add a comment to a task
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskCommentRequest"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/TaskComment"

  /tasks/{id}/comments/{cid}:
    parameters:
      - name: id
        in: path
        required: true
        description: Task ID
        schema:
          type: string
          format: uuid
      - name: cid
        in: path
        required: true
        description: Comment ID
        schema:
          type: string
          format: uuid

    delete:
      operationId: deleteTaskComment
      summary: Delete a comment
      description: Users can only delete their own comments
      tags: [Tasks]
      responses:
        "204":
          description: Comment deleted
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /tasks/{id}/comments/{cid}/reactions:
    parameters:
      - name: id
        in: path
        required: true
        description: Task ID
        schema:
          type: string
          format: uuid
      - name: cid
        in: path
        required: true
        description: Comment ID
        schema:
          type: string
          format: uuid

    get:
      operationId: listCommentReactions
      summary: List reactions on a comment
      tags: [Tasks]
      responses:
        "200":
          description: List of reactions with counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CommentReactionSummary"

    post:
      operationId: toggleCommentReaction
      summary: Toggle a reaction on a comment
      description: Adds the reaction if it doesn't exist, removes it if it does
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emoji]
              properties:
                emoji:
                  type: string
                  description: Emoji character to use as reaction
                  example: "👍"
      responses:
        "200":
          description: Reaction toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      added:
                        type: boolean
                        description: True if reaction was added, false if it was removed
                      emoji:
                        type: string

